<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz V2 - Kids Math</title>
  <link rel="stylesheet" href="quiz.css" />
</head>
<body>
  <div class="container">
    <h1>Math Quiz V2</h1>
    <div class="level">Level: <span id="currentLevel">1</span></div>

    <div class="progress">
      Question <span id="qNum">1</span>/5
    </div>

    <div class="question" id="question">Loading...</div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>

    <button id="nextBtn" disabled>Next Question</button>
    <div class="score">Score: <span id="score">0</span></div>

    <div class="result" id="result" style="display:none;">
      <h2>Quiz Finished!</h2>
      <p>Final Score: <span id="finalScore">0</span>/5</p>
      <button onclick="restart()">Try Again</button>
    </div>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
